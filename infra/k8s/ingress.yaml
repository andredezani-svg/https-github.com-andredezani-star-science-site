apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: starsciencelab-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  tls:
    - hosts:
        - starsciencelab.com
        - www.starsciencelab.com
      secretName: starsciencelab-tls
  rules:
    - host: starsciencelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: starsciencelab
                port:
                  number: 80
    - host: www.starsciencelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: starsciencelab
                port:
                  number: 80
